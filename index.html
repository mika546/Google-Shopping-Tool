<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calibre9 — Category Intelligence Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Calibre9 Design Tokens ── */
    :root {
      --c9-black:   #0e0e0e;
      --c9-charcoal:#1a1a1a;
      --c9-surface: #141414;
      --c9-border:  #2a2a2a;
      --c9-border2: #333333;
      --c9-white:   #f0f0f0;
      --c9-muted:   #888888;
      --c9-dim:     #555555;
      --c9-magenta: #e5007d;
      --c9-indigo:  #6600ff;
      --c9-volt:    #c8ff00;
      --c9-magenta-dim: rgba(229,0,125,0.12);
      --c9-indigo-dim:  rgba(102,0,255,0.12);
      --c9-volt-dim:    rgba(200,255,0,0.10);
      --font-display: 'Barlow Condensed', sans-serif;
      --font-mono:    'Space Mono', monospace;
      --font-body:    'Barlow', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--c9-black);
      color: var(--c9-white);
      font-family: var(--font-body);
      min-height: 100vh;
      /* subtle grain texture */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* ── Calibre9 Wordmark ── */
    .c9-wordmark {
      display: flex;
      align-items: baseline;
      gap: 0;
      line-height: 1;
    }
    .c9-wordmark .c9-name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 22px;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: var(--c9-white);
    }
    .c9-wordmark .c9-nine {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 22px;
      color: var(--c9-magenta);
    }
    .c9-wordmark .c9-slash {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c9-volt);
      margin: 0 8px;
      opacity: 0.6;
    }
    .c9-wordmark .c9-tagline {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c9-dim);
    }

    /* ── Top bar ── */
    .c9-topbar {
      border-bottom: 1px solid var(--c9-border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(14,14,14,0.95);
      backdrop-filter: blur(10px);
    }
    .c9-topbar-right {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c9-dim);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .c9-topbar-right .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--c9-volt);
      box-shadow: 0 0 8px var(--c9-volt);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── App layout ── */
    .app {
      max-width: 1020px;
      margin: 0 auto;
      padding: 48px 28px 100px;
    }

    /* ── Header ── */
    .header { margin-bottom: 52px; }
    .header-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--c9-magenta);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-eyebrow::before {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--c9-magenta);
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(38px, 7vw, 72px);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--c9-white);
      margin-bottom: 18px;
    }
    h1 .accent { color: var(--c9-volt); }
    .header-sub {
      font-size: 15px;
      color: var(--c9-muted);
      font-weight: 300;
      max-width: 520px;
      line-height: 1.6;
      border-left: 2px solid var(--c9-indigo);
      padding-left: 14px;
    }

    /* ── Step Nav ── */
    .step-nav {
      display: flex;
      gap: 2px;
      margin-bottom: 36px;
      background: var(--c9-charcoal);
      border: 1px solid var(--c9-border);
      border-radius: 4px;
      padding: 4px;
    }
    .step-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--c9-dim);
      cursor: pointer;
      padding: 10px 8px;
      border-radius: 2px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .step-btn .step-icon { font-size: 15px; }
    .step-btn .step-num {
      font-family: var(--font-mono);
      font-size: 9px;
      opacity: 0.5;
      letter-spacing: 0.08em;
    }
    .step-btn:hover { background: #222; color: var(--c9-white); }
    .step-btn.active {
      background: var(--c9-magenta);
      color: #fff;
      box-shadow: 0 0 20px rgba(229,0,125,0.35);
    }
    .step-btn.active .step-num { opacity: 0.7; }
    .step-btn.done { color: var(--c9-volt); }

    /* ── Step Panel ── */
    .step-panel {
      background: var(--c9-surface);
      border: 1px solid var(--c9-border);
      border-radius: 4px;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }
    .step-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--c9-magenta), var(--c9-indigo), var(--c9-volt));
    }
    .step-panel h2 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--c9-white);
      margin-bottom: 4px;
    }
    .step-number {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c9-indigo);
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .step-content { margin-top: 24px; }
    .step-desc {
      font-size: 14px;
      color: var(--c9-muted);
      margin-bottom: 24px;
      line-height: 1.65;
    }
    .step-desc strong { color: var(--c9-white); font-weight: 500; }

    /* ── Inputs ── */
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
    .input-grid.three-col { grid-template-columns: 1.3fr 1.4fr 0.8fr; }
    @media (max-width: 680px) { .input-grid, .input-grid.three-col { grid-template-columns: 1fr; } }
    .input-block label {
      display: block;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c9-muted);
      margin-bottom: 6px;
    }
    .hint {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--c9-dim);
      margin-bottom: 8px;
    }
    textarea, input[type="number"] {
      width: 100%;
      background: var(--c9-black);
      border: 1px solid var(--c9-border2);
      border-radius: 3px;
      color: var(--c9-white);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 12px;
      resize: vertical;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    textarea:focus, input:focus {
      border-color: var(--c9-indigo);
      box-shadow: 0 0 0 2px rgba(102,0,255,0.15);
    }

    /* ── URL Preview chips ── */
    .url-preview { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
    .url-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px; border-radius: 3px;
      font-size: 12px; border: 1px solid var(--c9-border);
      background: var(--c9-black);
    }
    .url-chip.status-pending { border-color: #3a3a00; }
    .url-chip.status-fetched { border-color: #003a00; }
    .url-chip.status-failed  { border-color: #3a0020; }
    .url-chip.status-plain   { border-color: var(--c9-border); }
    .url-chip-icon { font-size: 11px; width: 14px; text-align: center; }
    .url-chip.status-fetched .url-chip-icon { color: var(--c9-volt); }
    .url-chip.status-failed  .url-chip-icon { color: var(--c9-magenta); }
    .url-chip.status-pending .url-chip-icon { color: #c8b400; }
    .url-chip.status-plain   .url-chip-icon { color: var(--c9-dim); }
    .url-chip-name {
      flex: 1; color: var(--c9-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: var(--font-mono); font-size: 11px;
    }
    .url-chip-count {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--c9-volt); background: var(--c9-volt-dim);
      border: 1px solid rgba(200,255,0,0.2);
      border-radius: 3px; padding: 1px 6px; white-space: nowrap;
    }

    /* ── Buttons ── */
    .fetch-btn {
      margin-top: 10px; width: 100%;
      background: transparent;
      border: 1px solid var(--c9-indigo);
      border-radius: 3px; color: var(--c9-indigo);
      cursor: pointer; font-family: var(--font-mono);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 9px 14px; transition: all 0.15s;
    }
    .fetch-btn:hover:not(:disabled) {
      background: var(--c9-indigo-dim);
      box-shadow: 0 0 14px rgba(102,0,255,0.2);
    }
    .fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .action-btn {
      background: var(--c9-magenta);
      border: none; border-radius: 3px;
      color: #fff; cursor: pointer;
      font-family: var(--font-display);
      font-size: 15px; font-weight: 800;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 14px 32px; transition: all 0.15s; margin-top: 4px;
      box-shadow: 0 4px 20px rgba(229,0,125,0.3);
    }
    .action-btn:hover:not(:disabled) {
      background: #ff1a8c;
      box-shadow: 0 6px 28px rgba(229,0,125,0.5);
      transform: translateY(-1px);
    }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Line count bar ── */
    .line-count-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 3px;
      font-family: var(--font-mono); font-size: 11px;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .line-count-bar.match  { background: rgba(200,255,0,0.05); border: 1px solid rgba(200,255,0,0.15); color: #6a7a3a; }
    .line-count-bar.mismatch { background: var(--c9-magenta-dim); border: 1px solid rgba(229,0,125,0.2); color: #8a3a5a; }
    .line-count-bar strong { color: var(--c9-white); }
    .lc-sep { opacity: 0.3; }
    .lc-warn { color: var(--c9-magenta); margin-left: 4px; }
    .lc-ok   { color: var(--c9-volt); margin-left: 4px; }
    .lc-chunks { margin-left: auto; color: var(--c9-dim); }

    /* ── Pulse animation ── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
    .loading-pulse { animation: pulse 1.1s infinite; }

    /* ── Error ── */
    .error-msg {
      background: var(--c9-magenta-dim);
      border: 1px solid rgba(229,0,125,0.3);
      border-radius: 3px;
      color: #f07090; font-size: 13px;
      padding: 10px 14px; margin-bottom: 16px;
      font-family: var(--font-mono);
    }

    /* ── Removed panel ── */
    .removed-panel {
      background: var(--c9-black);
      border: 1px solid var(--c9-border2);
      border-radius: 4px; margin-bottom: 20px; overflow: hidden;
    }
    .removed-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; cursor: pointer;
      font-size: 13px; color: var(--c9-muted);
      flex-wrap: wrap; user-select: none;
    }
    .removed-header:hover { background: #1a1a1a; }
    .removed-breakdown { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
    .removed-toggle { font-family: var(--font-mono); font-size: 10px; color: var(--c9-dim); margin-left: auto; }
    .removed-tag { border-radius: 2px; font-family: var(--font-mono); font-size: 10px; padding: 2px 8px; }
    .removed-tag.branded      { background: var(--c9-magenta-dim); color: var(--c9-magenta); border: 1px solid rgba(229,0,125,0.2); }
    .removed-tag.informational { background: rgba(200,255,0,0.06); color: var(--c9-volt); border: 1px solid rgba(200,255,0,0.15); }
    .removed-tag.duplicate    { background: var(--c9-indigo-dim); color: #9966ff; border: 1px solid rgba(102,0,255,0.2); }
    .removed-list { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px 16px; border-top: 1px solid var(--c9-border); }
    .removed-pill { border-radius: 2px; font-size: 11px; padding: 3px 9px; }
    .removed-pill.branded      { background: var(--c9-magenta-dim); color: var(--c9-magenta); border: 1px solid rgba(229,0,125,0.15); }
    .removed-pill.informational { background: rgba(200,255,0,0.06); color: var(--c9-volt); border: 1px solid rgba(200,255,0,0.1); }
    .removed-pill.duplicate    { background: var(--c9-indigo-dim); color: #9966ff; border: 1px solid rgba(102,0,255,0.15); }
    .removed-pill em { font-style: normal; opacity: 0.45; margin-left: 5px; font-size: 9px; font-family: var(--font-mono); text-transform: uppercase; }

    /* ── Results section ── */
    .results-section { margin-top: 32px; }
    .results-section h3 {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--c9-muted); margin-bottom: 16px;
    }

    /* ── Collection cards ── */
    .collection-card {
      background: var(--c9-black);
      border: 1px solid var(--c9-border2);
      border-radius: 3px; padding: 16px 20px; margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .collection-card:hover { border-color: var(--c9-magenta); }
    .collection-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .rank { font-family: var(--font-mono); font-size: 11px; color: var(--c9-dim); }
    .collection-name { font-family: var(--font-display); font-weight: 700; font-size: 16px; letter-spacing: 0.02em; text-transform: uppercase; color: var(--c9-white); flex: 1; }
    .volume-badge {
      background: var(--c9-indigo-dim); border: 1px solid rgba(102,0,255,0.25);
      border-radius: 2px; color: #9966ff;
      font-family: var(--font-mono); font-size: 11px; padding: 3px 8px;
    }
    .kw-count { color: var(--c9-dim); font-size: 12px; font-family: var(--font-mono); }
    .keyword-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .kw-pill {
      background: #1a1a1a; border: 1px solid var(--c9-border2);
      border-radius: 2px; color: var(--c9-muted); font-size: 12px; padding: 3px 9px;
    }
    .kw-pill em { font-style: normal; color: var(--c9-dim); margin-left: 4px; font-family: var(--font-mono); font-size: 10px; }

    /* ── Next bar ── */
    .next-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; margin-top: 28px; padding: 16px 20px;
      background: var(--c9-black); border: 1px solid var(--c9-border2);
      border-radius: 3px; flex-wrap: wrap;
    }
    .next-summary { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .next-summary-stat { font-family: var(--font-mono); font-size: 12px; color: var(--c9-dim); }
    .next-summary-stat.muted { color: var(--c9-dim); opacity: 0.5; }
    .next-sep { color: var(--c9-border2); }
    .next-btn {
      background: var(--c9-volt); border: none; border-radius: 3px;
      color: var(--c9-black); cursor: pointer;
      font-family: var(--font-display); font-size: 14px; font-weight: 900;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 11px 24px; transition: all 0.15s; white-space: nowrap;
    }
    .next-btn:hover { background: #d8ff00; box-shadow: 0 0 20px rgba(200,255,0,0.35); transform: translateY(-1px); }

    /* ── Breadcrumb ── */
    .breadcrumb-card { background: var(--c9-black); border: 1px solid var(--c9-border2); border-radius: 3px; padding: 16px 20px; margin-bottom: 10px; }
    .bc-category { font-family: var(--font-display); font-weight: 700; font-size: 15px; text-transform: uppercase; color: var(--c9-white); margin-bottom: 10px; }
    .bc-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
    .bc-label { border-radius: 2px; font-family: var(--font-mono); font-size: 9px; font-weight: 700; padding: 2px 7px; white-space: nowrap; margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }
    .google-label  { background: rgba(200,255,0,0.08); color: var(--c9-volt); border: 1px solid rgba(200,255,0,0.2); }
    .shopify-label { background: rgba(200,255,0,0.04); color: #8aaa00; border: 1px solid rgba(200,255,0,0.1); }
    .bc-path { color: var(--c9-muted); font-size: 13px; line-height: 1.5; }

    /* ── Semantic ── */
    .semantic-card { background: var(--c9-black); border: 1px solid var(--c9-border2); border-radius: 3px; padding: 16px 20px; margin-bottom: 10px; }
    .sem-category { font-family: var(--font-display); font-weight: 700; font-size: 15px; text-transform: uppercase; color: var(--c9-white); margin-bottom: 12px; }
    .sem-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .sem-pill {
      background: var(--c9-indigo-dim); border: 1px solid rgba(102,0,255,0.2);
      border-radius: 20px; color: #9966ff; font-size: 12px; padding: 4px 12px;
    }

    /* ── Count inputs / results ── */
    .count-inputs { margin-bottom: 20px; }
    .count-row { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
    .count-row label { flex: 1; font-size: 13px; color: var(--c9-muted); display: flex; align-items: center; gap: 8px; }
    .prefilled-badge {
      font-family: var(--font-mono); font-size: 9px;
      background: var(--c9-indigo-dim); border: 1px solid rgba(102,0,255,0.2);
      color: #9966ff; border-radius: 2px; padding: 1px 6px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .count-row input { width: 140px; resize: none; }

    .count-result-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--c9-black); border: 1px solid var(--c9-border2);
      border-radius: 3px; padding: 12px 16px;
    }
    .cr-rank { font-family: var(--font-mono); font-size: 11px; color: var(--c9-dim); width: 28px; flex-shrink: 0; }
    .cr-name { font-family: var(--font-display); flex: 1; font-size: 15px; font-weight: 700; text-transform: uppercase; color: var(--c9-white); }
    .cr-count { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--c9-volt); }
    .cr-label { font-size: 11px; color: var(--c9-dim); margin-left: 4px; }
    .cr-status { font-family: var(--font-mono); font-size: 11px; border-radius: 2px; padding: 2px 8px; }
    .cr-status.fetching { color: #c8b400; }
    .cr-status.failed   { background: var(--c9-magenta-dim); color: var(--c9-magenta); border: 1px solid rgba(229,0,125,0.2); }
    .cr-status.no-url   { background: #1a1a1a; color: var(--c9-dim); border: 1px solid var(--c9-border); }

    /* ── Verify cards ── */
    .verify-card { background: var(--c9-black); border-radius: 3px; padding: 16px 20px; margin-bottom: 10px; border: 1px solid var(--c9-border2); }
    .vc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .vc-cat { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; color: var(--c9-white); font-size: 15px; }
    .vc-status { border-radius: 2px; font-family: var(--font-mono); font-size: 11px; padding: 3px 10px; }
    .vc-status.too_low { background: var(--c9-magenta-dim); color: var(--c9-magenta); border: 1px solid rgba(229,0,125,0.2); }
    .vc-status.optimal { background: rgba(200,255,0,0.08); color: var(--c9-volt); border: 1px solid rgba(200,255,0,0.2); }
    .vc-status.too_high { background: var(--c9-indigo-dim); color: #9966ff; border: 1px solid rgba(102,0,255,0.2); }
    .vc-status.unknown  { background: #1a1a1a; color: var(--c9-muted); border: 1px solid var(--c9-border); }
    .vc-range { font-family: var(--font-mono); font-size: 11px; color: var(--c9-dim); margin-bottom: 6px; }
    .vc-rec { font-size: 13px; color: var(--c9-muted); line-height: 1.5; }

    /* ── Export panel ── */
    .export-panel {
      margin-top: 32px;
      background: linear-gradient(135deg, rgba(102,0,255,0.08), rgba(229,0,125,0.05));
      border: 1px solid rgba(102,0,255,0.25);
      border-radius: 4px; padding: 24px 28px;
      display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap;
    }
    .export-info { flex: 1; min-width: 200px; }
    .export-title {
      font-family: var(--font-display); font-size: 18px;
      font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--c9-white); margin-bottom: 8px;
    }
    .export-desc { font-size: 13px; color: var(--c9-muted); line-height: 1.6; margin-bottom: 14px; }
    .export-desc strong { color: var(--c9-white); }
    .export-columns { display: flex; flex-wrap: wrap; gap: 5px; }
    .export-col-tag {
      font-family: var(--font-mono); font-size: 10px;
      background: var(--c9-indigo-dim); border: 1px solid rgba(102,0,255,0.2);
      color: #9966ff; border-radius: 2px; padding: 2px 7px;
    }
    .export-btn {
      background: var(--c9-volt); border: none; border-radius: 3px;
      color: var(--c9-black); cursor: pointer;
      font-family: var(--font-display); font-size: 15px; font-weight: 900;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 14px 28px; transition: all 0.15s; white-space: nowrap;
      align-self: center; box-shadow: 0 4px 20px rgba(200,255,0,0.2);
    }
    .export-btn:hover { background: #d8ff00; box-shadow: 0 8px 28px rgba(200,255,0,0.35); transform: translateY(-1px); }
    .export-btn.exported { background: #aad400; }

    /* ── Footer ── */
    .c9-footer {
      text-align: center;
      padding: 48px 0 32px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c9-dim);
    }
    .c9-footer .c9-footer-mark { color: var(--c9-magenta); }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="c9-topbar">
    <div class="c9-wordmark">
      <span class="c9-name">Calibre</span><span class="c9-nine">9</span>
      <span class="c9-slash">//</span>
      <span class="c9-tagline">Shopping Intelligence</span>
    </div>
    <div class="c9-topbar-right">
      <span class="dot"></span>
      <span>Live</span>
    </div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const STEPS = ["Keyword Sorting", "Category Breadcrumbs", "Semantic Keywords", "Product Count Analysis"];
    const STEP_ICONS = ["⌂", "◈", "◉", "✓"];

    const slugToName = (slug) => slug.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());

    const extractSlug = (line) => {
      const trimmed = line.trim();
      try {
        const url = new URL(trimmed.startsWith("http") ? trimmed : "https://" + trimmed);
        const parts = url.pathname.split("/").filter(Boolean);
        const colIdx = parts.indexOf("collections");
        if (colIdx !== -1 && parts[colIdx + 1]) return { slug: parts[colIdx + 1], url: trimmed };
      } catch {}
      return { slug: null, url: null };
    };

    const parseCollectionsInput = (text) =>
      text.trim().split("\n").map(l => l.trim()).filter(Boolean).map(line => {
        const { slug, url } = extractSlug(line);
        return { raw: line, url, slug, name: slug ? slugToName(slug) : line, fetchedName: null, productCount: null, fetchStatus: slug ? "pending" : "plain" };
      });

    const parseKeywords = (kwText, volText) => {
      const kws = kwText.trim().split("\n").map(l => l.trim()).filter(Boolean);
      const vols = volText.trim().split("\n").map(l => parseInt(l.replace(/[^0-9]/g, "") || "0"));
      return kws.map((keyword, i) => ({ keyword, volume: vols[i] || 0 }));
    };

    const safeParse = (text) => {
      const clean = text.replace(/```json|```/g, "").trim();
      try { return JSON.parse(clean); } catch {}
      const match = clean.match(/\{[\s\S]*\}/);
      if (match) { try { return JSON.parse(match[0]); } catch {} }
      throw new Error(`No valid JSON found. Preview: "${clean.slice(0, 300)}"`);
    };

    // Normalise collection names for fuzzy matching (handles casing, apostrophes, hyphens, etc.)
    const normalizeName = (str) => str?.toLowerCase().replace(/[^a-z0-9]/g, "") ?? "";

    const callAPI = async (messages, maxTokens = 4000) => {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: maxTokens, messages })
      });
      if (!response.ok) throw new Error(`API error ${response.status}: ${(await response.text()).slice(0, 200)}`);
      const data = await response.json();
      if (data.error) throw new Error(`API error: ${data.error.message || JSON.stringify(data.error)}`);
      if (data.stop_reason === "max_tokens") throw new Error("Response cut off — too many categories in this batch.");
      return (data.content || []).map(b => b.text || "").join("");
    };

    const buildAndDownloadCSV = (sortedData, breadcrumbs, semantics, verifications, collectionsMeta, counts) => {
      const top10 = sortedData.slice(0, 10);
      const escape = (val) => {
        const str = String(val ?? "");
        if (str.includes(",") || str.includes('"') || str.includes("\n")) return `"${str.replace(/"/g, '""')}"`;
        return str;
      };
      const rows = [[
        "Rank","Category","Total Search Volume","Keyword Count","Keywords","Keyword Volumes",
        "Product Count","Google Breadcrumb","Shopify Breadcrumb","Semantic Keywords",
        "Product Count Status","Ideal Range","Recommendation"
      ]];
      top10.forEach(([category, data], i) => {
        const bc = breadcrumbs?.find(b => b.category === category);
        const sem = semantics?.find(s => s.category === category);
        const ver = verifications?.find(v => v.category === category);
        const meta = collectionsMeta?.find(c => normalizeName(c.name) === normalizeName(category));
        const productCount = counts?.[category] ?? meta?.productCount ?? "";
        const sortedKws = [...data.keywords].sort((a, b) => b.volume - a.volume);
        rows.push([
          i + 1, category, data.totalVolume, data.keywords.length,
          sortedKws.map(k => k.keyword).join(", "),
          sortedKws.map(k => k.volume).join(", "),
          productCount,
          bc?.google || "", bc?.shopify || "",
          sem?.keywords?.join(", ") || "",
          ver?.status || "",
          ver ? `${ver.minIdeal}–${ver.maxIdeal}` : "",
          ver?.recommendation || ""
        ]);
      });
      const csv = rows.map(row => row.map(escape).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = "calibre9-shopping-categories.csv"; a.click();
      URL.revokeObjectURL(url);
    };

    function KeywordSortingStep({ onComplete, onNext }) {
      const [collectionsText, setCollectionsText] = useState("");
      const [keywordsText, setKeywordsText] = useState("");
      const [volumesText, setVolumesText] = useState("");
      const [collections, setCollections] = useState([]);
      const [fetchProgress, setFetchProgress] = useState({ done: 0, total: 0 });
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [loadingStatus, setLoadingStatus] = useState("");
      const [fetchingUrls, setFetchingUrls] = useState(false);
      const [error, setError] = useState("");
      const [showRemoved, setShowRemoved] = useState(false);

      const handleCollectionsChange = (val) => { setCollectionsText(val); setCollections(parseCollectionsInput(val)); };
      const hasUrls = collections.some(c => c.fetchStatus === "pending");

      const fetchCollectionData = async () => {
        setFetchingUrls(true); setError("");
        const urlCols = collections.filter(c => c.fetchStatus === "pending");
        setFetchProgress({ done: 0, total: urlCols.length });
        const updated = [...collections];
        for (let i = 0; i < updated.length; i++) {
          const col = updated[i];
          if (col.fetchStatus !== "pending") continue;
          try {
            const res = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514", max_tokens: 500,
                tools: [{ type: "web_search_20250305", name: "web_search" }],
                messages: [{ role: "user", content: `Look up this Shopify collection page: ${col.url}\nReturn ONLY valid JSON: {"collectionName":"...","productCount":42}\nIf product count unknown use null.` }]
              })
            });
            const data = await res.json();
            const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
            try {
              const parsed = safeParse(text);
              updated[i] = { ...col, fetchedName: parsed.collectionName || null, name: parsed.collectionName || col.name, productCount: typeof parsed.productCount === "number" ? parsed.productCount : null, fetchStatus: "fetched" };
            } catch { updated[i] = { ...col, fetchStatus: "fetched" }; }
          } catch { updated[i] = { ...col, fetchStatus: "failed" }; }
          setCollections([...updated]);
          setFetchProgress(p => ({ ...p, done: p.done + 1 }));
        }
        setFetchingUrls(false);
      };

      const diagnoseInput = (allKeywords, colNames) => {
        const kwLines = keywordsText.trim().split("\n").filter(Boolean);
        const volLines = volumesText.trim().split("\n").filter(Boolean);
        if (!colNames.length) return "No collections detected.";
        if (!kwLines.length) return "No keywords detected.";
        if (kwLines.length !== volLines.length) return `Line count mismatch: ${kwLines.length} keywords but ${volLines.length} volumes.`;
        const badVols = volLines.filter(v => isNaN(parseInt(v.replace(/[^0-9]/g, ""))));
        if (badVols.length) return `Non-numeric volumes: "${badVols.slice(0, 3).join('", "')}"`;
        return null;
      };

      const processChunk = async (chunk, collectionNames) => {
        const prompt = `You are a Google Shopping data expert. Given these collections:\n${collectionNames.map((c, i) => `${i + 1}. ${c}`).join("\n")}\n\nKeywords (keyword | volume):\n${chunk.map(k => `${k.keyword} | ${k.volume}`).join("\n")}\n\nTasks:\n1. REMOVE branded keywords\n2. REMOVE informational keywords (reviews, guides, etc.)\n3. REMOVE near-duplicates (keep higher volume)\n4. Assign remaining to most relevant collection\n\nReturn ONLY compact JSON — no preamble, no fences:\n{"removed":[{"keyword":"...","reason":"branded|informational|duplicate"}],"assignments":[{"keyword":"...","volume":123,"collection":"..."}]}\n\nRules: use exact collection names, every keyword in removed or assignments.`;
        const text = await callAPI([{ role: "user", content: prompt }], 8000);
        const parsed = safeParse(text);
        if (!parsed.assignments) throw new Error(`Missing "assignments" key. Got: ${Object.keys(parsed).join(", ")}`);
        return parsed;
      };

      const handleProcess = async () => {
        const allKeywords = parseKeywords(keywordsText, volumesText);
        const collectionNames = collections.map(c => c.name);
        const diagnostic = diagnoseInput(allKeywords, collectionNames);
        if (diagnostic) { setError(diagnostic); return; }
        setError(""); setLoading(true); setLoadingStatus("Filtering keywords…");
        const informationalPrefixes = /^(who|what|where|when|why|how|is|are|was|were|will|can|could|should|would|does|do|did|if|which|whose|whom|tell me|explain|define|difference between|vs |versus )/i;
        const seen = new Set();
        const preFiltered = allKeywords.filter(k => {
          const kl = k.keyword.toLowerCase().trim();
          if (informationalPrefixes.test(kl)) return false;
          if (seen.has(kl)) return false;
          seen.add(kl); return true;
        });
        const chunks = [];
        for (let i = 0; i < preFiltered.length; i += 100) chunks.push(preFiltered.slice(i, i + 100));
        const allAssignments = [], allRemoved = [];
        try {
          for (let i = 0; i < chunks.length; i++) {
            setLoadingStatus(`Processing batch ${i + 1} of ${chunks.length} (${chunks[i].length} keywords)…`);
            const r = await processChunk(chunks[i], collectionNames);
            allAssignments.push(...(r.assignments || []));
            allRemoved.push(...(r.removed || []));
          }
          // Snap AI-returned collection names back to original names to preserve URL linkage
          const snapToOriginal = (aiName) => {
            const normAi = normalizeName(aiName);
            const match = collectionNames.find(n => normalizeName(n) === normAi);
            return match ?? aiName;
          };
          const grouped = {};
          for (const item of allAssignments) {
            const snapped = snapToOriginal(item.collection);
            if (!grouped[snapped]) grouped[snapped] = { keywords: [], totalVolume: 0 };
            grouped[snapped].keywords.push(item);
            grouped[snapped].totalVolume += item.volume;
          }
          const sorted = Object.entries(grouped).sort((a, b) => b[1].totalVolume - a[1].totalVolume);
          setResult({ sorted, removed: allRemoved });
          onComplete(sorted, collections);
        } catch (e) { setError(`⚠ ${e.message}`); }
        setLoadingStatus(""); setLoading(false);
      };

      return (
        <div className="step-content">
          <div className="input-grid three-col">
            <div className="input-block">
              <label>Collections / Categories</label>
              <p className="hint">Shopify URLs or plain names — one per line</p>
              <textarea value={collectionsText} onChange={e => handleCollectionsChange(e.target.value)}
                placeholder={"https://mystore.com/collections/mens-clothing\nhttps://mystore.com/collections/womens-shoes\nAccessories"} rows={10} />
              {collections.length > 0 && (
                <div className="url-preview">
                  {collections.map((c, i) => (
                    <div key={i} className={`url-chip status-${c.fetchStatus}`}>
                      <span className="url-chip-icon">{c.fetchStatus === "fetched" ? "✓" : c.fetchStatus === "failed" ? "✗" : c.fetchStatus === "plain" ? "◦" : "○"}</span>
                      <span className="url-chip-name">{c.name}</span>
                      {c.productCount != null && <span className="url-chip-count">{c.productCount} products</span>}
                    </div>
                  ))}
                </div>
              )}
              {hasUrls && <button className="fetch-btn" onClick={fetchCollectionData} disabled={fetchingUrls}>{fetchingUrls ? `Fetching ${fetchProgress.done} / ${fetchProgress.total}…` : "↓ Fetch Collection Names & Counts"}</button>}
            </div>
            <div className="input-block">
              <label>Keywords</label>
              <p className="hint">One keyword per line</p>
              <textarea value={keywordsText} onChange={e => setKeywordsText(e.target.value)} placeholder={"running shoes\nwomens dress\nhiking boots"} rows={10} />
            </div>
            <div className="input-block">
              <label>Search Volume</label>
              <p className="hint">One volume per line (matching order)</p>
              <textarea value={volumesText} onChange={e => setVolumesText(e.target.value)} placeholder={"12000\n8500\n6200"} rows={10} />
            </div>
          </div>

          {(() => {
            const kwCount = keywordsText.trim().split("\n").filter(Boolean).length;
            const volCount = volumesText.trim().split("\n").filter(Boolean).length;
            if (kwCount > 0 || volCount > 0) {
              const mismatch = kwCount !== volCount;
              return (
                <div className={`line-count-bar ${mismatch ? "mismatch" : "match"}`}>
                  <span>Keywords: <strong>{kwCount}</strong></span><span className="lc-sep">·</span>
                  <span>Volumes: <strong>{volCount}</strong></span>
                  {mismatch ? <span className="lc-warn">⚠ Mismatch — check for blank lines</span> : kwCount > 0 && <span className="lc-ok">✓ Matched</span>}
                  {kwCount > 0 && <span className="lc-chunks">~{Math.ceil(kwCount / 100)} batch{Math.ceil(kwCount / 100) !== 1 ? "es" : ""}</span>}
                </div>
              );
            }
            return null;
          })()}

          {error && <div className="error-msg">{error}</div>}
          <button className="action-btn" onClick={handleProcess} disabled={loading || fetchingUrls}>
            {loading ? <span className="loading-pulse">{loadingStatus || "Processing…"}</span> : "Sort Keywords into Collections →"}
          </button>

          {result && (
            <div className="results-section">
              {result.removed?.length > 0 && (
                <div className="removed-panel">
                  <div className="removed-header" onClick={() => setShowRemoved(v => !v)}>
                    <span>🗑 {result.removed.length} keywords removed</span>
                    <span className="removed-breakdown">
                      {["branded","informational","duplicate"].map(type => { const count = result.removed.filter(r => r.reason === type).length; return count > 0 ? <span key={type} className={`removed-tag ${type}`}>{count} {type}</span> : null; })}
                    </span>
                    <span className="removed-toggle">{showRemoved ? "▲ hide" : "▼ show"}</span>
                  </div>
                  {showRemoved && <div className="removed-list">{result.removed.map((r, i) => <span key={i} className={`removed-pill ${r.reason}`}>{r.keyword} <em>{r.reason}</em></span>)}</div>}
                </div>
              )}
              <h3>Results — Sorted by Search Volume</h3>
              {result.sorted.map(([collection, data], i) => (
                <div key={collection} className="collection-card">
                  <div className="collection-header">
                    <span className="rank">#{i + 1}</span>
                    <span className="collection-name">{collection}</span>
                    <span className="volume-badge">{data.totalVolume.toLocaleString()} total vol.</span>
                    <span className="kw-count">{data.keywords.length} keywords</span>
                  </div>
                  <div className="keyword-pills">
                    {[...data.keywords].sort((a, b) => b.volume - a.volume).map(k => (
                      <span key={k.keyword} className="kw-pill">{k.keyword} <em>{k.volume.toLocaleString()}</em></span>
                    ))}
                  </div>
                </div>
              ))}
              <div className="next-bar">
                <div className="next-summary">
                  <span className="next-summary-stat">{result.sorted.length} categories</span>
                  <span className="next-sep">·</span>
                  <span className="next-summary-stat">{result.sorted.reduce((s, [, d]) => s + d.keywords.length, 0)} keywords sorted</span>
                  {result.removed?.length > 0 && <><span className="next-sep">·</span><span className="next-summary-stat muted">{result.removed.length} removed</span></>}
                </div>
                <button className="next-btn" onClick={onNext}>Next: Category Breadcrumbs →</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function BreadcrumbStep({ sortedData, autoRun, onNext, onBreadcrumbsDone }) {
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [loadingStatus, setLoadingStatus] = useState("");
      const [error, setError] = useState("");

      const processChunk = async (cats) => {
        const prompt = `You are a Google Shopping and Shopify taxonomy expert. For each category, provide breadcrumb paths from Google's product taxonomy and Shopify's standard taxonomy.\n\nCategories:\n${cats.join("\n")}\n\nReturn ONLY compact JSON — no preamble, no fences:\n{"breadcrumbs":[{"category":"...","google":"Apparel & Accessories > Clothing > ...","shopify":"Apparel & Accessories > Clothing > ..."}]}\n\nRules: use > separator, start from top-level (not "Home"), every category must appear.`;
        const text = await callAPI([{ role: "user", content: prompt }], 4000);
        const parsed = safeParse(text);
        if (!parsed.breadcrumbs) throw new Error(`Missing "breadcrumbs" key. Got: ${Object.keys(parsed).join(", ")}`);
        return parsed.breadcrumbs;
      };

      const handleFetch = async () => {
        if (!sortedData?.length) { setError("Complete Step 1 first."); return; }
        setError(""); setLoading(true);
        const allCats = sortedData.slice(0, 10).map(([c]) => c);
        const chunks = [];
        for (let i = 0; i < allCats.length; i += 10) chunks.push(allCats.slice(i, i + 10));
        const allBreadcrumbs = [];
        try {
          for (let i = 0; i < chunks.length; i++) {
            setLoadingStatus(`Processing batch ${i + 1} of ${chunks.length}…`);
            allBreadcrumbs.push(...await processChunk(chunks[i]));
          }
          setResults(allBreadcrumbs);
          onBreadcrumbsDone?.(allBreadcrumbs);
        } catch (e) { setError(`⚠ ${e.message}`); }
        setLoadingStatus(""); setLoading(false);
      };

      useEffect(() => { if (autoRun && sortedData?.length && !results && !loading) handleFetch(); }, [autoRun]);

      return (
        <div className="step-content">
          <p className="step-desc">Cross-references your <strong>top 10 categories by search volume</strong> against Google's product taxonomy and Shopify's standard taxonomy.</p>
          {error && <div className="error-msg">{error}</div>}
          <button className="action-btn" onClick={handleFetch} disabled={loading}>
            {loading ? <span className="loading-pulse">{loadingStatus || "Fetching…"}</span> : results ? "↺ Re-generate Breadcrumbs" : "Generate Category Breadcrumbs →"}
          </button>
          {results && (
            <div className="results-section">
              {results.map((r, i) => (
                <div key={i} className="breadcrumb-card">
                  <div className="bc-category">{r.category}</div>
                  <div className="bc-row"><span className="bc-label google-label">Google</span><span className="bc-path">{r.google}</span></div>
                  <div className="bc-row"><span className="bc-label shopify-label">Shopify</span><span className="bc-path">{r.shopify}</span></div>
                </div>
              ))}
              <div className="next-bar">
                <div className="next-summary"><span className="next-summary-stat">{results.length} breadcrumbs generated</span></div>
                <button className="next-btn" onClick={onNext}>Next: Semantic Keywords →</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SemanticStep({ sortedData, onNext, onSemanticsDone }) {
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const handleFetch = async () => {
        if (!sortedData?.length) { setError("Complete Step 1 first."); return; }
        setError(""); setLoading(true);
        const cats = sortedData.slice(0, 10).map(([c]) => c).join("\n");
        const prompt = `You are an SEO and Google Shopping expert. For each category, provide 8-12 semantic keywords for collection page titles, descriptions, and meta tags.\n\nCategories:\n${cats}\n\nReturn ONLY compact JSON — no preamble, no fences:\n{"semantics":[{"category":"...","keywords":["keyword1","keyword2"]}]}`;
        try {
          const text = await callAPI([{ role: "user", content: prompt }], 4000);
          const parsed = safeParse(text);
          if (!parsed.semantics) throw new Error(`Missing "semantics" key. Got: ${Object.keys(parsed).join(", ")}`);
          setResults(parsed.semantics);
          onSemanticsDone?.(parsed.semantics);
        } catch (e) { setError(`⚠ ${e.message}`); }
        setLoading(false);
      };

      return (
        <div className="step-content">
          <p className="step-desc">Generates semantic keyword clusters for your <strong>top 10 categories by search volume</strong> to improve collection page relevance and Google Shopping feed optimisation.</p>
          {error && <div className="error-msg">{error}</div>}
          <button className="action-btn" onClick={handleFetch} disabled={loading}>
            {loading ? <span className="loading-pulse">Generating…</span> : "Generate Semantic Keywords →"}
          </button>
          {results && (
            <div className="results-section">
              {results.map((r, i) => (
                <div key={i} className="semantic-card">
                  <div className="sem-category">{r.category}</div>
                  <div className="sem-pills">{r.keywords.map(k => <span key={k} className="sem-pill">{k}</span>)}</div>
                </div>
              ))}
              <div className="next-bar">
                <div className="next-summary"><span className="next-summary-stat">{results.reduce((s, r) => s + r.keywords.length, 0)} semantic keywords generated</span></div>
                <button className="next-btn" onClick={onNext}>Next: Product Count Analysis →</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function ProductCountStep({ sortedData, collectionsMeta, breadcrumbs, semantics }) {
      const [counts, setCounts] = useState({});
      const [fetchStatuses, setFetchStatuses] = useState({});
      const [fetchingAll, setFetchingAll] = useState(false);
      const [fetchProgress, setFetchProgress] = useState({ done: 0, total: 0 });
      const [exported, setExported] = useState(false);

      const cats = sortedData?.slice(0, 10).map(([c]) => c) || [];

      const findMeta = (catName) =>
        collectionsMeta?.find(c => normalizeName(c.name) === normalizeName(catName));

      const getCount = (catName) => {
        if (counts[catName] !== undefined) return counts[catName];
        const meta = findMeta(catName);
        return meta?.productCount ?? null;
      };

      const fetchCountForCategory = async (catName) => {
        const meta = findMeta(catName);
        if (!meta?.url) return null;
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514", max_tokens: 300,
            tools: [{ type: "web_search_20250305", name: "web_search" }],
            messages: [{ role: "user", content: `Visit this Shopify collection page and find the exact number of products listed: ${meta.url}\nReturn ONLY valid JSON with no extra text: {"productCount": 42}\nUse null if you cannot determine the count.` }]
          })
        });
        const data = await res.json();
        const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
        try {
          const parsed = safeParse(text);
          return typeof parsed.productCount === "number" ? parsed.productCount : null;
        } catch { return null; }
      };

      const handleFetchAll = async () => {
        if (!cats.length) return;
        setFetchingAll(true);
        const fetchable = cats.filter(cat => !!findMeta(cat)?.url);
        const noUrl = cats.filter(cat => !findMeta(cat)?.url);
        setFetchStatuses(prev => {
          const next = { ...prev };
          noUrl.forEach(cat => { next[cat] = "no-url"; });
          fetchable.forEach(cat => { next[cat] = "fetching"; });
          return next;
        });
        setFetchProgress({ done: 0, total: fetchable.length });
        for (const cat of fetchable) {
          try {
            const count = await fetchCountForCategory(cat);
            setCounts(prev => ({ ...prev, [cat]: count }));
            setFetchStatuses(prev => ({ ...prev, [cat]: count !== null ? "done" : "failed" }));
          } catch {
            setFetchStatuses(prev => ({ ...prev, [cat]: "failed" }));
          }
          setFetchProgress(p => ({ ...p, done: p.done + 1 }));
        }
        setFetchingAll(false);
      };

      const handleExport = () => {
        buildAndDownloadCSV(sortedData, breadcrumbs, semantics, null, collectionsMeta, counts);
        setExported(true);
        setTimeout(() => setExported(false), 3000);
      };

      const hasAnyUrl = cats.some(cat => !!findMeta(cat)?.url);
      const anyFetched = !fetchingAll && cats.some(cat => fetchStatuses[cat] === "done");
      const allDone = cats.length > 0 && cats.every(cat => fetchStatuses[cat] === "done" || fetchStatuses[cat] === "failed" || fetchStatuses[cat] === "no-url");

      return (
        <div className="step-content">
          <p className="step-desc">
            Pulls the live product count for each of your <strong>top 10 categories</strong> directly from their Shopify collection pages.
          </p>

          {!cats.length && <div className="error-msg">Complete Step 1 first to populate categories.</div>}

          {cats.length > 0 && (
            <>
              {hasAnyUrl ? (
                <button className="action-btn" style={{ marginBottom: 24 }} onClick={handleFetchAll} disabled={fetchingAll}>
                  {fetchingAll
                    ? <span className="loading-pulse">Fetching counts… {fetchProgress.done} / {fetchProgress.total}</span>
                    : anyFetched ? "↺ Re-fetch Product Counts" : "↓ Fetch Product Counts from Shopify"}
                </button>
              ) : (
                <div className="error-msg">No Shopify URLs found — add collection URLs in Step 1 to enable auto-fetch.</div>
              )}

              {(anyFetched || allDone) && (
                <div className="results-section" style={{ marginTop: 0 }}>
                  <h3>Product Counts</h3>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {cats.map((cat, i) => {
                      const s = fetchStatuses[cat];
                      const count = getCount(cat);
                      const meta = findMeta(cat);
                      return (
                        <div key={cat} className="count-result-row">
                          <span className="cr-rank">#{i + 1}</span>
                          <span className="cr-name">{cat}</span>
                          {s === "fetching" && <span className="cr-status fetching loading-pulse">fetching…</span>}
                          {s === "done" && <span className="cr-count">{count?.toLocaleString()} <span className="cr-label">products</span></span>}
                          {s === "failed" && <span className="cr-status failed">could not fetch</span>}
                          {s === "no-url" && <span className="cr-status no-url">no url</span>}
                          {!s && count !== null && <span className="cr-count">{count?.toLocaleString()} <span className="cr-label">products</span></span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          )}

          {sortedData?.length > 0 && (
            <div className="export-panel">
              <div className="export-info">
                <div className="export-title">📊 Export to Google Sheets</div>
                <div className="export-desc">
                  Downloads a CSV with all data from every completed step. Import into Google Sheets via <strong>File → Import</strong>, or drag it straight onto an open sheet.
                </div>
                <div className="export-columns">
                  {["Rank","Category","Total Search Volume","Keyword Count","Keywords","Keyword Volumes","Product Count","Google Breadcrumb","Shopify Breadcrumb","Semantic Keywords"].map(col => (
                    <span key={col} className="export-col-tag">{col}</span>
                  ))}
                </div>
              </div>
              <button className={`export-btn ${exported ? "exported" : ""}`} onClick={handleExport}>
                {exported ? "✓ Downloaded!" : "⬇ Download CSV"}
              </button>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [activeStep, setActiveStep] = useState(0);
      const [sortedData, setSortedData] = useState(null);
      const [collectionsMeta, setCollectionsMeta] = useState([]);
      const [autoRunStep, setAutoRunStep] = useState(null);
      const [breadcrumbs, setBreadcrumbs] = useState(null);
      const [semantics, setSemantics] = useState(null);

      const handleStep1Complete = (sorted, cols) => { setSortedData(sorted); setCollectionsMeta(cols); };
      const goToStep = (step) => { setAutoRunStep(step); setActiveStep(step); };

      return (
        <div className="app">
          <div className="header">
            <div className="header-eyebrow">Google Shopping Intelligence</div>
            <h1>Category<br /><span className="accent">Intelligence</span></h1>
            <p className="header-sub">AI-powered keyword sorting, taxonomy mapping & product auditing for Google Shopping — by Calibre9.</p>
          </div>

          <div className="step-nav">
            {STEPS.map((step, i) => (
              <button key={i} className={`step-btn ${activeStep === i ? "active" : ""} ${i > 0 && sortedData ? "done" : ""}`} onClick={() => setActiveStep(i)}>
                <span className="step-icon">{STEP_ICONS[i]}</span>
                <span style={{ fontSize: "11px", textAlign: "center", lineHeight: 1.3 }}>{step}</span>
                <span className="step-num">0{i + 1}</span>
              </button>
            ))}
          </div>

          <div className="step-panel">
            <div className="step-number">STEP 0{activeStep + 1} / 04</div>
            <h2>{STEPS[activeStep]}</h2>
            {activeStep === 0 && <KeywordSortingStep onComplete={handleStep1Complete} onNext={() => goToStep(1)} />}
            {activeStep === 1 && <BreadcrumbStep sortedData={sortedData} autoRun={autoRunStep === 1} onNext={() => goToStep(2)} onBreadcrumbsDone={setBreadcrumbs} />}
            {activeStep === 2 && <SemanticStep sortedData={sortedData} onNext={() => goToStep(3)} onSemanticsDone={setSemantics} />}
            {activeStep === 3 && <ProductCountStep sortedData={sortedData} collectionsMeta={collectionsMeta} breadcrumbs={breadcrumbs} semantics={semantics} />}
          </div>

          <div className="c9-footer">
            <span className="c9-footer-mark">Calibre9</span> &nbsp;·&nbsp; Category Intelligence Dashboard &nbsp;·&nbsp; Built with AI
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
